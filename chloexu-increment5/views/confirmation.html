<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Chloe Xu">

    <meta name="description" content="MonoMuse website redesign project">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Lexend:wght@100..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../static/style.css">

    <script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
    <script src="../static/script.js" defer></script>

    <title>MonoMuse — Order Confirmed</title>

<body onload="addYear(); loadConfirmation();">
    <div class="container">

        <header class="header">
            <img id="logo" src="../static/monomuselogo.png" alt="MonoMuse Museum Logo">
        </header>

        <nav class="nav_bar">
            <button class="hamburger" onclick="toggleNav()">☰</button>
            <a class="first" href="../index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="exhibitions.html">Exhibitions</a>
            <a href="tickets.html">Tickets</a>
            <a class="cta" href="checkout.html">Buy Tickets</a>
        </nav>

        <main class="main">
            <h1>Order Confirmed!</h1>
            <p>Thank you for your purchase. We can't wait to see you at MonoMuse!</p>

            <div id="confirmationDetails">
                <p><strong>Date:</strong> <span id="confirmDate"></span></p>
                <p><strong>Ticket Type:</strong> <span id="confirmType"></span></p>
                <p><strong>Quantity:</strong> <span id="confirmQuantity"></span></p>
                <p><strong>Total:</strong> <span id="confirmTotal"></span></p>
            </div>

            <br>
            <a class="cta" href="../index.html">Return to Home</a>
        </main>

        <footer class="footer">
            <p id="copyYear"></p>
        </footer>

    </div>
